services:
  credencial:
    build: ./credencial-caa
    restart: always
    environment:
      - PORT=3000
      - ALUMNI_DOMAIN=${ALUMNI_DOMAIN:-alumnos.brs.cl}
      - OTP_SECRET=${OTP_SECRET:-change-this-secret}
      - OTP_TTL_MINUTES=${OTP_TTL_MINUTES:-10}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - MAIL_FROM=${MAIL_FROM:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
    volumes:
      - credencial_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build: .
    restart: always
    depends_on:
      - credencial
    environment:
      - PORT=80
      - PROPOSAL_RECIPIENT=${PROPOSAL_RECIPIENT:-misla@alumnos.brs.cl}
      - MAIL_FROM=${MAIL_FROM:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - PROPOSAL_PB_URL=${PROPOSAL_PB_URL:-}
      - PROPOSAL_PB_ADMIN_EMAIL=${PROPOSAL_PB_ADMIN_EMAIL:-}
      - PROPOSAL_PB_ADMIN_PASSWORD=${PROPOSAL_PB_ADMIN_PASSWORD:-}
      - PROPOSAL_PB_TOKEN=${PROPOSAL_PB_TOKEN:-}
      - PROPOSAL_PB_COLLECTION=${PROPOSAL_PB_COLLECTION:-proposals}
      - PROPOSAL_STATUS_TOKEN=${PROPOSAL_STATUS_TOKEN:-}
      - PROPOSAL_EMERGENCY_RECIPIENT=${PROPOSAL_EMERGENCY_RECIPIENT:-islamartin312@gmail.com}
      - TRUST_PROXY_HOPS=${TRUST_PROXY_HOPS:-1}
    ports:
      - "80:80"
    volumes:
      - web_images:/app/Images
      - web_data:/app/data
      - web_config:/app/config
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:80/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always  # Si el t√∫nel cae por internet, se reintenta solo
    command: tunnel run --token eyJhIjoiOTk0OGFiOTY3MTE0NTE0YTA2ZDJmODlhZDU4MjJkMjUiLCJ0IjoiY2QyZjQzOWItZGIwZi00OGM1LThhMTItMTU4YTk5MWI1MWM3IiwicyI6Ik9XUTNaV05sTlRndE1XUm1NeTAwWWpJd0xUZzROV010TjJJd05UVmtZekEzTkdNdyJ9

volumes:
  credencial_data:
  web_images:
  web_data:
  web_config:
