server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Credencial CAA — proxy al servicio Node.js
    location ^~ /credencial-caa/ {
        proxy_pass http://credencial:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API de la credencial
    location ^~ /api/ {
        proxy_pass http://credencial:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
