    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            overflow-x: hidden;
        }
        
        .sidebar-link {
            transition: all 0.3s ease;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            min-height: 44px;
            display: flex;
            align-items: center;
            margin-left: -1.5rem;
            margin-right: -1.5rem;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            border-radius: 0;
        }
        
        .sidebar-link:hover,
        .sidebar-link:focus-visible {
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }
        
        .sidebar-link:active {
            background: rgba(227, 29, 35, 0.2);
        }
        
        .sidebar-link.active {
            background: rgba(227, 29, 35, 0.15);
        }
        
        button, a[href] {
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        
        /* Optimizaciones para móvil */
        @media (max-width: 768px) {
            aside {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                width: 85vw;
                max-width: 280px;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 50;
                overflow-y: auto;
            }
            
            aside.open {
                transform: translateX(0);
            }
            
            main {
                margin-left: 0 !important;
            }
            
            #hamburger-toggle {
                display: flex;
                background: none;
                border: none;
                color: #630F16;
                cursor: pointer;
                padding: 8px;
                margin-right: auto;
                min-width: 44px;
                min-height: 44px;
                align-items: center;
                justify-content: center;
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 40;
            }
            
            .sidebar-overlay.open {
                display: block;
            }
        }
    </style>
</head>

        <header class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-40 px-4 md:px-8 py-3 md:py-4 flex justify-between items-center">
            <button id="hamburger-toggle" class="md:hidden" aria-controls="sidebar" aria-expanded="false" aria-label="Abrir menú de navegación">
                <svg class="w-6 h-6 text-primary" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                src="https://airtable.com/embed/appB13HSymAL7ArK7/shrEeipVV7TKKU4oX" 
                frameborder="0" 
                onmousewheel="" 
                width="100%" 
                height="800"
                style="background: white; border: none;">
            </iframe>
        </div>

    <script>
        // Mobile Menu Toggle
        const hamburgerToggle = document.getElementById('hamburger-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
            const isOpen = sidebar.classList.contains('open');
            hamburgerToggle.setAttribute('aria-expanded', isOpen);
        }

        hamburgerToggle.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // Close sidebar when clicking a link on mobile
        const sidebarLinks = sidebar.querySelectorAll('.sidebar-link');
        sidebarLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });
    </script>
