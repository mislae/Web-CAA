<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Credencial CAA</title>
  <meta name="description" content="Ingreso con correo institucional para acceder a la credencial estudiantil.">
  <link rel="icon" href="/Images/Logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="top-back-button" class="top-back-button" type="button" aria-label="Volver a la pagina anterior">
    Volver
  </button>

  <main class="login-shell" aria-label="Inicio de sesion">
    <section class="login-panel">
      <p class="panel-kicker">British Royal School</p>
      <h1>Acceso a Credencial CAA</h1>
      <p class="panel-copy">Ingresa tu correo @alumnos.brs.cl para recibir un codigo y verificar acceso.</p>

      <form id="login-form" novalidate>
        <label for="institutional-email">Correo institucional</label>
        <input
          id="institutional-email"
          name="email"
          type="email"
          placeholder="nombre.apellido@alumnos.brs.cl"
          autocomplete="email"
          required
        >

        <div id="verification-step" class="is-hidden">
          <label for="verification-code">Codigo de verificacion</label>
          <input
            id="verification-code"
            name="code"
            type="text"
            inputmode="numeric"
            pattern="[0-9]{6}"
            maxlength="6"
            placeholder="Ej: 123456"
            autocomplete="one-time-code"
          >
        </div>

        <div class="action-row">
          <button type="button" id="request-code-button">Enviar codigo</button>
          <button type="submit" id="verify-code-button" class="is-hidden">Verificar codigo</button>
          <button type="button" id="change-email-button" class="secondary-button is-hidden">Cambiar correo</button>
        </div>
      </form>

      <p id="login-message" class="login-message" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
